<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Detail</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #fff;
        }

        .hero {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 28px;
            align-items: start;
        }

        .image-wrap {
            width: 100%;
            background: #111;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
        }

        .image-wrap img {
            width: 100%;
            height: 100%;
            max-height: 360px;
            object-fit: contain;
            display: block;
            background: #000;
        }

        .info-panel {
            background: #0d0d0d;
            border: 1px solid #1c1c1c;
            border-radius: 18px;
            padding: 24px;
        }

        .title {
            font-size: 2rem;
            line-height: 1.25;
            margin: 0 0 16px;
            color: #fff;
        }

        .status {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 14px;
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #141414;
            border: 1px solid #202020;
            border-radius: 14px;
            padding: 16px;
        }

        .stat-label {
            font-size: 12px;
            color: #8a8a8a;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .yes {
            color: #4ade80;
        }

        .no {
            color: #f87171;
        }

        .probability-box,
        .desc-box,
        .chart-box {
            margin-top: 28px;
            background: #0d0d0d;
            border: 1px solid #1c1c1c;
            border-radius: 18px;
            padding: 24px;
        }

        .section-title {
            margin: 0 0 16px;
            font-size: 1.1rem;
            color: #fff;
        }

        .description {
            color: #cfcfcf;
            font-size: 15px;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        .probability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 15px;
        }

        .probability-header .yes-text {
            color: #4ade80;
        }

        .probability-header .no-text {
            color: #f87171;
        }

        .probability-bar-wrap {
            width: 100%;
            height: 20px;
            background: #111;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
        }

        .probability-bar-yes {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            width: 50%;
            transition: width 0.4s ease;
        }

        .probability-bar-no {
            height: 100%;
            background: linear-gradient(90deg, #fb7185, #f87171);
            width: 50%;
            transition: width 0.4s ease;
        }

        .probability-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }

        .chart-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .range-btn {
            background: #111;
            color: #aaa;
            border: 1px solid #2a2a2a;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .range-btn:hover {
            color: #fff;
            border-color: #4ade80;
        }

        .range-btn.active {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.4);
        }

        .chart-meta {
            display: grid;
            grid-template-columns: repeat(5, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .meta-card {
            background: #121212;
            border: 1px solid #202020;
            border-radius: 12px;
            padding: 14px;
        }

        .meta-label {
            font-size: 12px;
            color: #7f7f7f;
            margin-bottom: 6px;
        }

        .meta-value {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
        }

        .meta-positive {
            color: #4ade80;
        }

        .meta-negative {
            color: #f87171;
        }

        .chart-empty {
            display: none;
            color: #8a8a8a;
            margin-top: 12px;
            font-size: 14px;
        }
        .chart-note {
            margin-top: 10px;
            font-size: 12px;
            color: #6b7280;
        }


        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 1.5rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .chart-meta {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .chart-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-link" href="index.html">← 返回主页</a>

        <div class="hero">
            <div class="image-wrap">
                <img id="detail-image" src="" alt="market image">
            </div>

            <div class="info-panel">
                <h1 id="detail-title" class="title">Loading...</h1>
                <div id="market-status" class="status">进行中</div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">YES</div>
                        <div id="detail-yes" class="stat-value yes">0.0%</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">NO</div>
                        <div id="detail-no" class="stat-value no">0.0%</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">VOLUME</div>
                        <div id="detail-pool" class="stat-value">$0</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-label">TOTAL</div>
                        <div id="detail-total" class="stat-value">0.000</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="probability-box">
            <h2 class="section-title">YES / NO Probability</h2>

            <div class="probability-header">
                <span id="probability-yes-text" class="yes-text">YES 50.0%</span>
                <span id="probability-no-text" class="no-text">NO 50.0%</span>
            </div>

            <div class="probability-bar-wrap">
                <div id="probability-bar-yes" class="probability-bar-yes"></div>
                <div id="probability-bar-no" class="probability-bar-no"></div>
            </div>

            <div class="probability-footer">
                <span>市场当前倾向</span>
                <span id="probability-dominant">均衡</span>
            </div>
        </div>

        <div class="chart-box">
            <h2 class="section-title">YES Price History</h2>

            <div class="chart-toolbar">
                <button class="range-btn active" data-range="24">24H</button>
                <button class="range-btn" data-range="72">72H</button>
            </div>

            <div class="chart-meta">
                <div class="meta-card">
                    <div class="meta-label">当前价格</div>
                    <div id="meta-current" class="meta-value">--</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">区间最高</div>
                    <div id="meta-high" class="meta-value">--</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">区间最低</div>
                    <div id="meta-low" class="meta-value">--</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">区间振幅</div>
                    <div id="meta-range" class="meta-value">--</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">区间变化</div>
                    <div id="meta-change" class="meta-value">--</div>
                </div>
            </div>

            <canvas id="priceChart" height="110"></canvas>
            <div id="chart-empty" class="chart-empty">历史数据不足，暂时无法绘制完整曲线。</div>
            <div id="chart-note" class="chart-note">数据来源：Polymarket 历史价格</div>
        </div>

        <div class="desc-box">
            <h2 class="section-title">Description</h2>
            <div id="detail-desc" class="description"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let currentChart = null;
        let currentMarketId = '';

        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name) || '';
        }

        function decodeText(value) {
            try {
                return decodeURIComponent(value || '');
            } catch (e) {
                return value || '';
            }
        }

        function formatPercent(value) {
            const num = parseFloat(value || 0);
            return (num * 100).toFixed(2) + '%';
        }

        function formatMoney(value) {
            const num = parseFloat(value || 0);
            return '$' + Math.round(num).toLocaleString();
        }

        function formatTotal(value) {
            const num = parseFloat(value || 0);
            return num.toFixed(3);
        }

        function setStatus(status, resolution) {
            const el = document.getElementById('market-status');
            if (!el) return;

            if (status === 'closed') {
                if (resolution === 'yes') {
                    el.textContent = '最终结果：YES';
                    el.style.color = '#4ade80';
                    el.style.background = 'rgba(74, 222, 128, 0.12)';
                    el.style.border = '1px solid rgba(74, 222, 128, 0.35)';
                } else if (resolution === 'no') {
                    el.textContent = '最终结果：NO';
                    el.style.color = '#f87171';
                    el.style.background = 'rgba(248, 113, 113, 0.12)';
                    el.style.border = '1px solid rgba(248, 113, 113, 0.35)';
                } else {
                    el.textContent = '最终结果：已结束';
                    el.style.color = '#ccc';
                    el.style.background = 'rgba(200, 200, 200, 0.08)';
                    el.style.border = '1px solid rgba(200, 200, 200, 0.2)';
                }
            } else {
                el.textContent = '进行中';
                el.style.color = '#4ade80';
                el.style.background = 'rgba(74, 222, 128, 0.12)';
                el.style.border = '1px solid rgba(74, 222, 128, 0.35)';
            }
        }

        function setActiveRangeButton(rangeValue) {
            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.range === String(rangeValue));
            });
        }

        function updateProbabilityBar(yesValue, noValue) {
            const yes = Math.max(0, Math.min(100, parseFloat(yesValue || 0) * 100));
            const no = Math.max(0, Math.min(100, parseFloat(noValue || 0) * 100));

            const yesBar = document.getElementById('probability-bar-yes');
            const noBar = document.getElementById('probability-bar-no');
            const yesText = document.getElementById('probability-yes-text');
            const noText = document.getElementById('probability-no-text');
            const dominant = document.getElementById('probability-dominant');

            yesBar.style.width = `${yes}%`;
            noBar.style.width = `${no}%`;

            yesText.textContent = `YES ${yes.toFixed(1)}%`;
            noText.textContent = `NO ${no.toFixed(1)}%`;

            if (Math.abs(yes - no) < 1) {
                dominant.textContent = '均衡';
                dominant.style.color = '#ccc';
            } else if (yes > no) {
                dominant.textContent = 'YES 占优';
                dominant.style.color = '#4ade80';
            } else {
                dominant.textContent = 'NO 占优';
                dominant.style.color = '#f87171';
            }
        }

        function updateMetaCards(prices) {
            const currentEl = document.getElementById('meta-current');
            const highEl = document.getElementById('meta-high');
            const lowEl = document.getElementById('meta-low');
            const rangeEl = document.getElementById('meta-range');
            const changeEl = document.getElementById('meta-change');

            if (!prices || prices.length === 0) {
                currentEl.textContent = '--';
                highEl.textContent = '--';
                lowEl.textContent = '--';
                rangeEl.textContent = '--';
                changeEl.textContent = '--';
                changeEl.className = 'meta-value';
                return;
            }

            const current = prices[prices.length - 1];
            const high = Math.max(...prices);
            const low = Math.min(...prices);
            const amplitude = high - low;

            let change = 0;
            if (prices.length > 1 && prices[0] !== 0) {
                change = ((prices[prices.length - 1] - prices[0]) / prices[0]) * 100;
            }

            currentEl.textContent = formatPercent(current);
            highEl.textContent = formatPercent(high);
            lowEl.textContent = formatPercent(low);
            rangeEl.textContent = formatPercent(amplitude);
            changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeEl.className = `meta-value ${change >= 0 ? 'meta-positive' : 'meta-negative'}`;
        }

        function getYAxisBounds(prices) {
            if (!prices || prices.length === 0) {
                return { min: 0, max: 1 };
            }

            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);

            if (minPrice === maxPrice) {
                const pad = Math.max(minPrice * 0.05, 0.01);
                return {
                    min: Math.max(0, minPrice - pad),
                    max: Math.min(1, maxPrice + pad)
                };
            }

            const range = maxPrice - minPrice;
            const padding = Math.max(range * 0.2, 0.005);

            return {
                min: Math.max(0, minPrice - padding),
                max: Math.min(1, maxPrice + padding)
            };
        }

        function buildSinglePointReferenceLine(point, range) {
            const timestamp = point.timestamp || Math.floor(Date.now() / 1000);
            const price = Number(point.price || 0);

            const startTs = timestamp - (range * 3600);
            const midTs = timestamp;
            const endTs = timestamp + (range * 3600 * 0.05);

            const fakePoints = [
                { timestamp: startTs, price },
                { timestamp: midTs, price },
                { timestamp: endTs, price }
            ];

            return fakePoints;
        }

        function formatLabels(data) {
            return data.map(item => {
                const d = new Date((item.timestamp || 0) * 1000);
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hour = String(d.getHours()).padStart(2, '0');
                const minute = String(d.getMinutes()).padStart(2, '0');
                return `${month}-${day} ${hour}:${minute}`;
            });
        }
        function buildFallbackSeries(currentYes, rangeHours) {
    const now = new Date();
    const labels = [];
    const prices = [];
    const price = Number(currentYes || 0);

    for (let i = rangeHours - 1; i >= 0; i--) {
        const d = new Date(now.getTime() - i * 60 * 60 * 1000);
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const hour = String(d.getHours()).padStart(2, '0');
        const minute = String(d.getMinutes()).padStart(2, '0');
        labels.push(`${month}-${day} ${hour}:${minute}`);
        prices.push(price);
    }

    return { labels, prices };
}

        async function loadHistoryChart(marketId, range = 24) {
    const canvas = document.getElementById('priceChart');
    const emptyEl = document.getElementById('chart-empty');

    if (!canvas || !marketId) {
        if (emptyEl) {
            emptyEl.style.display = 'block';
            emptyEl.textContent = '缺少市场 ID，无法加载历史图表。';
        }
        return;
    }

    if (currentChart) {
        currentChart.destroy();
        currentChart = null;
    }

    if (emptyEl) {
        emptyEl.style.display = 'none';
        emptyEl.textContent = '历史数据不足，暂时无法绘制完整曲线。';
    }

    try {
        const response = await fetch(`http://127.0.0.1:5000/api/history/db/${encodeURIComponent(marketId)}?range=${range}`);
        const data = await response.json();

        let labels = [];
        let prices = [];
        let usingFallback = false;

        if (Array.isArray(data) && data.length > 0) {
            labels = data.map(item => {
                const d = new Date((item.timestamp || 0) * 1000);
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hour = String(d.getHours()).padStart(2, '0');
                const minute = String(d.getMinutes()).padStart(2, '0');
                return `${month}-${day} ${hour}:${minute}`;
            });

            prices = data.map(item => Number(item.price || 0));
        } else {
            const currentYesText = getQueryParam('yes');
            const fallback = buildFallbackSeries(currentYesText, Number(range));
            labels = fallback.labels;
            prices = fallback.prices;
            usingFallback = true;
        }

        updateMetaCards(prices);

        if (usingFallback && emptyEl) {
            emptyEl.style.display = 'block';
            emptyEl.textContent = `最近 ${range} 小时缺少历史成交数据，当前显示静态参考线。`;
        } else if (prices.length < 2 && emptyEl) {
            emptyEl.style.display = 'block';
            emptyEl.textContent = `最近 ${range} 小时数据点较少，图表参考性有限。`;
        }

        const yBounds = getYAxisBounds(prices);

        currentChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: usingFallback ? `YES Price (${range}H, fallback)` : `YES Price (${range}H)`,
                    data: prices,
                    borderColor: '#4ade80',
                    backgroundColor: 'rgba(74, 222, 128, 0.12)',
                    borderWidth: 2,
                    tension: 0.35,
                    fill: true,
                    pointRadius: usingFallback ? 0 : 2,
                    pointHoverRadius: usingFallback ? 0 : 4,
                    pointBackgroundColor: '#4ade80',
                    pointBorderColor: '#4ade80',
                    borderDash: usingFallback ? [6, 6] : []
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    },
                    tooltip: {
                        backgroundColor: '#101010',
                        titleColor: '#ffffff',
                        bodyColor: '#dddddd',
                        borderColor: '#2a2a2a',
                        borderWidth: 1,
                        callbacks: {
                            label: function(context) {
                                return ' YES: ' + (context.raw * 100).toFixed(2) + '%';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#999',
                            autoSkip: true,
                            maxTicksLimit: 8
                        },
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        min: yBounds.min,
                        max: yBounds.max,
                        ticks: {
                            color: '#999',
                            callback: function(value) {
                                return (value * 100).toFixed(1) + '%';
                            }
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.04)'
                        }
                    }
                }
            }
        });
    } catch (e) {
        console.error('加载历史图表失败:', e);

        const currentYesText = getQueryParam('yes');
        const fallback = buildFallbackSeries(currentYesText, Number(range));
        updateMetaCards(fallback.prices);

        if (emptyEl) {
            emptyEl.style.display = 'block';
            emptyEl.textContent = '历史数据加载失败，当前显示静态参考线。';
        }

        const yBounds = getYAxisBounds(fallback.prices);

        currentChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: fallback.labels,
                datasets: [{
                    label: `YES Price (${range}H, fallback)`,
                    data: fallback.prices,
                    borderColor: '#4ade80',
                    backgroundColor: 'rgba(74, 222, 128, 0.12)',
                    borderWidth: 2,
                    tension: 0,
                    fill: true,
                    pointRadius: 0,
                    pointHoverRadius: 0,
                    borderDash: [6, 6]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#999',
                            autoSkip: true,
                            maxTicksLimit: 8
                        },
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        min: yBounds.min,
                        max: yBounds.max,
                        ticks: {
                            color: '#999',
                            callback: function(value) {
                                return (value * 100).toFixed(1) + '%';
                            }
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.04)'
                        }
                    }
                }
            }
        });
    }
}


        document.addEventListener('DOMContentLoaded', () => {
            const id = getQueryParam('id');
            const title = decodeText(getQueryParam('title'));
            const yes = getQueryParam('yes');
            const no = getQueryParam('no');
            const img = decodeText(getQueryParam('img'));
            const pool = getQueryParam('pool');
            const total = getQueryParam('total');
            const desc = decodeText(getQueryParam('desc'));
            const status = getQueryParam('status');
            const resolution = getQueryParam('resolution');

            currentMarketId = id;

            document.getElementById('detail-title').textContent = title || 'Untitled Market';
            document.getElementById('detail-yes').textContent = formatPercent(yes);
            document.getElementById('detail-no').textContent = formatPercent(no);
            document.getElementById('detail-pool').textContent = formatMoney(pool);
            document.getElementById('detail-total').textContent = formatTotal(total);
            document.getElementById('detail-desc').textContent = desc || 'No description available.';
            document.getElementById('detail-image').src = img || '';

            updateProbabilityBar(yes, no);
            setStatus(status, resolution);
            loadHistoryChart(currentMarketId, 24);

            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const range = parseInt(btn.dataset.range || '24', 10);
                    setActiveRangeButton(range);
                    loadHistoryChart(currentMarketId, range);
                });
            });
        });
    </script>
</body>
</html>
